name: Laravel CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Debug PHP versions
      run: |
        ls -la /usr/bin/php*
        which php
        php -v || echo "PHP not available by default"
    
    - name: Setup PHP with simplified approach
      uses: shivammathur/setup-php@2.24.0
      with:
        php-version: '8.2'
        tools: composer:v2
    
    - name: Verify PHP installation
      run: |
        php -v
        php -m
    
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      
    - name: Generate key
      run: php artisan key:generate
      
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
      
    - name: Create Database for Testing
      run: |
        mkdir -p database
        touch database/database.sqlite
        
    - name: Execute tests with SQLite
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test --env=testing

  deploy:
    needs: laravel-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
          
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ec2-user/api_0.1
            git pull origin main || git pull origin master

            # Make sure scripts are executable
            chmod +x start-prod.sh prod.sh scheduler.sh

            # Stop any running containers (including scheduler)
            docker-compose -f docker-compose.prod.yml down

            # Build and start the production environment (including scheduler)
            ./start-prod.sh

            # Wait a moment for services to be ready
            sleep 15

            # Check if all containers are running
            echo "Checking running containers:"
            docker ps

            # Verify scheduler container is running
            echo "Checking scheduler status:"
            docker-compose -f docker-compose.prod.yml ps scheduler

            # Check scheduler logs to ensure it's working
            echo "Recent scheduler logs:"
            docker-compose -f docker-compose.prod.yml logs --tail=10 scheduler

            echo "Deployment completed successfully!"
            echo "Laravel application and scheduler are now running in Docker containers"
          EOF