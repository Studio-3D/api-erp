version: '3.8'

services:
  # Laravel Application (Development)
  app:
    build:
      context: ./
      dockerfile: Dockerfile.dev
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"  # Expose directly for local development
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=erp_studio5d_1
      - DB_USERNAME=root
      - DB_PASSWORD=Kilo15.35
    networks:
      - app-network
    depends_on:
      - db

  # Local MySQL Database (Development)
  db:
    image: mysql:5.7
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=erp_studio5d_1
      - MYSQL_ROOT_PASSWORD=Kilo15.35
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pKilo15.35"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
